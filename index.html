<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interview Strategy Hub - 面接対策ポータル</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1e293b;
            --secondary: #334155;
            --accent: #feba02;
            --bg: #f8fafc;
            --sidebar: #ffffff;
            --border: #e2e8f0;
            --card-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            background-color: var(--bg);
            color: var(--secondary);
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* Dashboard View */
        #projectDashboard {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            padding: 4rem 2rem;
            overflow-y: auto;
            transition: transform 0.4s ease-in-out;
        }

        .dashboard-header {
            max-width: 1000px;
            margin: 0 auto 3rem auto;
            width: 100%;
            text-align: center;
        }

        .dashboard-header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }

        .dashboard-header p {
            color: #64748b;
            font-size: 1.1rem;
        }

        .project-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
            max-width: 1000px;
            margin: 0 auto;
            width: 100%;
        }

        .project-card {
            background: white;
            border-radius: 16px;
            padding: 2rem;
            box-shadow: var(--card-shadow);
            border: 1px solid var(--border);
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .project-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            border-color: var(--accent);
        }

        .project-card h3 {
            font-size: 1.25rem;
            margin-bottom: 0.75rem;
            color: var(--primary);
        }

        .project-card p {
            font-size: 0.9rem;
            color: #64748b;
            line-height: 1.5;
            margin-bottom: 1.5rem;
            flex: 1;
        }

        .project-card .meta {
            font-size: 0.75rem;
            color: #94a3b8;
            border-top: 1px solid var(--border);
            padding-top: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .add-project-card {
            border: 2px dashed #cbd5e1;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: #64748b;
        }

        .add-project-card:hover {
            background: white;
            border-color: var(--accent);
            color: var(--primary);
        }

        /* Sidebar Navigation */
        aside {
            width: 380px;
            background: var(--sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            z-index: 50;
        }

        .sidebar-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border);
        }

        .logo {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .project-title {
            font-size: 0.8rem;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .switch-btn {
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 4px;
            background: #f1f5f9;
            border: 1px solid var(--border);
            cursor: pointer;
        }

        .switch-btn:hover { background: #e2e8f0; }

        .search-container {
            position: relative;
        }

        #searchBox {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.9rem;
            outline: none;
            transition: var(--transition);
        }

        #searchBox:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(254, 186, 2, 0.1);
        }

        .add-btn {
            width: 100%;
            padding: 0.6rem;
            margin-top: 1rem;
            background: #f8fafc;
            border: 1px dashed var(--border);
            border-radius: 8px;
            color: #64748b;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .add-btn:hover {
            background: #f1f5f9;
            border-color: var(--accent);
            color: var(--primary);
        }

        .nav-list {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
        }

        .nav-item {
            padding: 0.85rem 1rem;
            border-radius: 8px;
            margin-bottom: 0.5rem;
            cursor: pointer;
            transition: var(--transition);
            border: 1px solid transparent;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .nav-item:hover { background: #f8fafc; }
        .nav-item.active {
            background: #fffbeb;
            color: #92400e;
            border-color: #fde68a;
            font-weight: 700;
        }
        .nav-item.memo {
            background: #fef9c3;
            border-left: 4px solid #facc15;
        }
        .nav-item.memo.active {
            background: #fef08a;
            border-color: #facc15;
        }
        .nav-item.child {
            margin-left: 1.5rem;
            font-size: 0.85rem;
            border-left: 2px solid var(--border);
            border-radius: 0 8px 8px 0;
            padding-left: 1rem;
        }

        /* Main Content */
        main {
            flex: 1;
            overflow-y: auto;
            padding: 3rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content-container {
            max-width: 800px;
            width: 100%;
        }

        .top-controls {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-bottom: 2rem;
        }

        .control-btn {
            padding: 0.5rem 1.2rem;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: white;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        .control-btn:hover { background: #f8fafc; }
        .control-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .mock-btn { background: #7c3aed; color: white; border-color: #7c3aed; }
        .mock-btn:hover { background: #6d28d9; }

        /* Mock Interview Overlay */
        #mockOverlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('面接官画像.png');
            background-size: cover; background-position: center;
            z-index: 1000; display: none; flex-direction: column;
            align-items: center; justify-content: space-between;
            color: white; padding: 2rem;
        }

        .mock-content {
            max-width: 1000px; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: flex-end;
            justify-content: flex-start; padding-top: 5vh;
        }

        .mock-question {
            font-size: 1.8rem; font-weight: 700; line-height: 1.5; color: var(--primary);
            background: white; padding: 2rem 2.5rem; border-radius: 30px;
            position: relative; box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            max-width: 60%; margin-right: 2rem; text-align: left;
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .mock-question::after {
            content: ""; position: absolute; bottom: -15px; left: 30px;
            border-width: 25px 0 0 25px; border-style: solid;
            border-color: white transparent transparent transparent;
        }

        .mock-controls {
            display: flex; gap: 1.5rem; justify-content: center;
            margin-top: auto; padding-bottom: 3rem; align-self: center;
        }

        .mock-btn-large {
            padding: 1rem 2rem; font-size: 1.1rem; font-weight: 700;
            border-radius: 50px; cursor: pointer; border: none; transition: all 0.2s;
        }
        .mock-btn-main { background: var(--accent); color: #000; }
        .mock-btn-main:hover { transform: scale(1.05); }

        /* Card Styles */
        #qaCard {
            background: white; border-radius: 16px; padding: 2.5rem;
            box-shadow: var(--card-shadow); min-height: 400px; display: none;
        }

        .view-title-container {
            display: flex; justify-content: space-between; align-items: flex-start;
            margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 2px solid #f1f5f9;
        }

        .view-title { font-size: 1.5rem; font-weight: 700; color: var(--primary); }

        .detail-card {
            background: #f8fafc; border-radius: 10px; padding: 1.25rem;
            margin-top: 1rem; border: 1px dashed var(--border);
        }

        .meta-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.7rem;
            color: #94a3b8;
            margin-bottom: 0.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid #f1f5f9;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .meta-btn {
            background: none;
            border: 1px solid #e2e8f0;
            border-radius: 4px;
            padding: 1px 6px;
            color: #64748b;
            cursor: pointer;
            font-size: 0.65rem;
        }
        .meta-btn:hover { background: #f1f5f9; }

        .tag-memo {
            background: #fef08a;
            color: #854d0e;
            padding: 1px 6px;
            border-radius: 4px;
            font-weight: 700;
        }

        .answer-text { font-size: 1.05rem; line-height: 1.8; white-space: pre-wrap; }
        
        .blurred { filter: blur(8px); opacity: 0.3; transition: filter 0.3s ease; }
        .blurred:hover { filter: blur(0); opacity: 1; }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.8) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* Utils */
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <!-- Project Selection Dashboard -->
    <div id="projectDashboard">
        <div class="dashboard-header">
            <h1>Interview Strategy Hub</h1>
            <p>準備する企業を選択または新しく作成してください</p>
            <button onclick="restoreGuide()" style="margin-top:1rem; font-size:0.8rem; background:none; border:1px solid #cbd5e1; padding:4px 12px; border-radius:30px; cursor:pointer; color:#64748b;">
                ❓ 使い方ガイドを読み込む
            </button>
        </div>
        <div class="project-grid" id="projectGrid">
            <!-- Project cards injected here -->
        </div>
        <input type="file" id="importFile" style="display:none" accept=".js" onchange="handleImport(event)">
    </div>

    <!-- Main Sidebar -->
    <aside>
        <div class="sidebar-header">
            <div class="logo">
                <span style="display:inline-block; width:12px; height:12px; background:var(--accent); border-radius:50%;"></span>
                Interview Hub
            </div>
            <div class="project-title">
                <span id="currentProjectName">PROJECT NAME</span>
                <button class="switch-btn" onclick="showDashboard()">切替</button>
            </div>
            <div class="search-container">
                <input type="text" id="searchBox" placeholder="質問を検索..." onkeyup="listItems()">
                <button class="add-btn" onclick="addQuestion()">
                    <span>+</span> 質問を追加
                </button>
            </div>
        </div>
        <div class="nav-list" id="sidebarList">
            <!-- Nav items injected here -->
        </div>
    </aside>

    <!-- Main Content Area -->
    <main>
        <div class="content-container">
            <div class="top-controls">
                <button id="studyModeBtn" class="control-btn" onclick="toggleStudyMode()">暗記モード: OFF</button>
                <button class="control-btn mock-btn" onclick="startMockMode()">模擬面接を開始</button>
                <button class="control-btn" onclick="exportCurrentProject()">書き出し</button>
                <button class="control-btn" onclick="window.print()">PDF出力</button>
            </div>

            <div id="welcomeMsg" style="text-align: center; margin-top: 5rem; color: #94a3b8;">
                <h2 style="font-size: 2rem; margin-bottom: 1rem;">企業を選択しました</h2>
                <p>左側のメニューから質問を選択して、回答を確認してください。</p>
            </div>

            <div id="qaCard">
                <div id="cardContent">
                    <!-- Dynamic content injected here -->
                </div>
            </div>
        </div>
    </main>

    <!-- Mock Interview Overlay -->
    <div id="mockOverlay">
        <button class="mock-exit" onclick="exitMockMode()" style="position:absolute; top:2rem; right:2rem; background:none; border:none; color:#94a3b8; font-size:2rem; cursor:pointer;">&times;</button>
        <div class="mock-content">
            <div class="mock-timer" id="mockTimerDisplay" style="font-family:monospace; font-size:1.5rem; color:#94a3b8; margin-bottom:1rem;">00:00</div>
            <div class="mock-context" id="mockContextText" style="color:var(--accent); text-transform:uppercase; font-weight:700; background:rgba(0,0,0,0.5); padding:4px 12px; border-radius:4px; margin-bottom:1rem;">TOPIC</div>
            <div class="mock-question" id="mockQuestionText">質問内容がここに入ります</div>
            
            <div id="mockAnswerArea" style="background:rgba(255,255,255,0.95); color:var(--primary); border-radius:16px; padding:2rem; margin-top:1rem; text-align:left; display:none; max-height:40vh; overflow-y:auto; width:80%; align-self:center;">
                <div id="mockAnswerContent"></div>
            </div>

            <div class="mock-controls">
                <button class="mock-btn-large mock-btn-sub" id="mockAnswerBtn" onclick="toggleMockAnswer()" style="background:rgba(255,255,255,0.1); color:white; border:1px solid rgba(255,255,255,0.2);">回答を表示</button>
                <button class="mock-btn-large mock-btn-main" onclick="nextMockQuestion()">次の質問へ</button>
            </div>
        </div>
    </div>

    <!-- SCRIPTS -->
    <script src="projects_data.js"></script>
    <script>
        let allProjects = [];
        let currentProjectIndex = null;
        let selectedId = null;
        let studyMode = false;
        let editingSection = null;

        // Initialize Data
        function initApp() {
            const saved = localStorage.getItem('INTERVIEW_HUB_PROJECTS');
            if (saved) {
                allProjects = JSON.parse(saved);
                
                // 【追加】既存ユーザーでも「使い方ガイド」がない場合は自動的に追加
                if (!allProjects.some(p => p.id === 'guide-project')) {
                    const guide = DEFAULT_PROJECTS.find(p => p.id === 'guide-project');
                    if (guide) {
                        allProjects.push(JSON.parse(JSON.stringify(guide)));
                        saveData();
                    }
                }
            } else {
                allProjects = JSON.parse(JSON.stringify(DEFAULT_PROJECTS));
                // Try to import old GS Yuasa data if exists
                const oldData = localStorage.getItem('GS_YUASA_QA_DATA');
                if (oldData) {
                    const gsProject = allProjects.find(p => p.id === 'gs-yuasa');
                    if (gsProject) gsProject.data = JSON.parse(oldData);
                }
                saveData();
            }
            renderDashboard();
        }

        function saveData() {
            localStorage.setItem('INTERVIEW_HUB_PROJECTS', JSON.stringify(allProjects));
        }

        // --- Dashboard Logic ---
        function renderDashboard() {
            const grid = document.getElementById('projectGrid');
            grid.innerHTML = '';

            allProjects.forEach((project, index) => {
                const card = document.createElement('div');
                card.className = 'project-card';
                card.onclick = () => selectProject(index);
                card.innerHTML = `
                    <h3>${project.name}</h3>
                    <p>${project.description || '概要なし'}</p>
                    <div class="meta">
                        <span>${project.data.length} 件の質問</span>
                        <button class="switch-btn" onclick="event.stopPropagation(); deleteProject(${index})" style="color:#ef4444;">削除</button>
                    </div>
                `;
                grid.appendChild(card);
            });

            const addCard = document.createElement('div');
            addCard.className = 'project-card add-project-card';
            addCard.onclick = createNewProject;
            addCard.innerHTML = `
                <div>
                    <div style="font-size: 2rem; margin-bottom: 0.5rem;">+</div>
                    <div>新しい対策を追加</div>
                </div>
            `;
            grid.appendChild(addCard);

            const importCard = document.createElement('div');
            importCard.className = 'project-card add-project-card';
            importCard.onclick = () => document.getElementById('importFile').click();
            importCard.innerHTML = `
                <div>
                    <div style="font-size: 2rem; margin-bottom: 0.5rem;">📥</div>
                    <div>データを復元 / インポート</div>
                </div>
            `;
            grid.appendChild(importCard);
        }

        function selectProject(index) {
            currentProjectIndex = index;
            document.getElementById('projectDashboard').style.transform = 'translateY(-100%)';
            document.getElementById('currentProjectName').innerText = allProjects[index].name;
            selectedId = null;
            listItems();
            document.getElementById('welcomeMsg').style.display = 'block';
            document.getElementById('qaCard').style.display = 'none';
        }

        function showDashboard() {
            document.getElementById('projectDashboard').style.transform = 'translateY(0)';
        }

        function createNewProject() {
            const name = prompt('企業名を入力してください：');
            if (!name) return;
            const newProject = {
                id: 'custom-' + Date.now(),
                name: name,
                description: name + 'の面接対策です。',
                data: []
            };
            allProjects.push(newProject);
            saveData();
            renderDashboard();
        }

        function deleteProject(index) {
            if (!confirm('このプロジェクトを削除してもよろしいですか？データは元に戻せません。')) return;
            allProjects.splice(index, 1);
            saveData();
            renderDashboard();
        }

        // --- Main App Logic (from original) ---
        function getCurrentData() {
            return allProjects[currentProjectIndex].data;
        }

        function listItems() {
            const list = document.getElementById('sidebarList');
            const search = document.getElementById('searchBox').value.toLowerCase();
            const data = getCurrentData();
            list.innerHTML = '';

            const filtered = data.filter(item => 
                item.title.toLowerCase().includes(search) || 
                item.answer.toLowerCase().includes(search)
            );

            const roots = filtered.filter(item => item.parentId === null);
            const others = filtered.filter(item => item.parentId !== null);

            roots.forEach(root => {
                renderNavItem(list, root, false);
                const children = others.filter(child => child.parentId === root.id);
                children.forEach(child => renderNavItem(list, child, true));
            });
        }

        function renderNavItem(container, item, isChild) {
            const div = document.createElement('div');
            div.className = `nav-item ${selectedId === item.id ? 'active' : ''} ${isChild ? 'child' : ''} ${item.isMemo ? 'memo' : ''}`;
            div.onclick = () => selectItem(item.id);
            div.innerHTML = `<div>${item.isMemo ? '📝 ' : ''}${item.title}</div>`;
            container.appendChild(div);
        }

        function selectItem(id) {
            selectedId = id;
            editingSection = null;
            listItems();
            renderContent();
        }

        function renderContent() {
            const data = getCurrentData();
            const item = data.find(i => i.id === selectedId);
            if (!item) return;

            document.getElementById('welcomeMsg').style.display = 'none';
            const card = document.getElementById('qaCard');
            card.style.display = 'block';

            const parentItem = item.parentId !== null ? data.find(p => p.id === item.parentId) : null;
            
            let detailsHTML = '';
            for (const [key, val] of Object.entries(item.details)) {
                const isEditingThisDetail = editingSection === `detail-${key}`;
                detailsHTML += `
                    <div class="detail-card">
                        <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
                            <strong style="color:var(--primary); font-size:0.8rem;">${key}</strong>
                            <button onclick="startEdit('detail-${key}')" style="font-size:0.7rem; cursor:pointer;">編集</button>
                        </div>
                        ${isEditingThisDetail ? `
                            <textarea id="editArea" style="width:100%; height:100px; padding:8px;">${val}</textarea>
                            <div>
                                <button onclick="saveEdit('detail-${key}')">保存</button>
                                <button onclick="cancelEdit()">× 閉じる</button>
                            </div>
                        ` : `<div class="answer-text ${studyMode ? 'blurred' : ''}">${val}</div>`}
                    </div>
                `;
            }

            const isEditingMain = editingSection === 'answer';
            const blurClass = studyMode ? 'blurred' : '';
            const isEditingParent = editingSection === 'parent';
            const isEditingMemo = editingSection === 'memo';

            document.getElementById('cardContent').innerHTML = `
                <div class="meta-bar">
                    <div class="meta-item">
                        <span>🏷️ ${parentItem ? `親質問: ${parentItem.title}` : 'ルート質問'}</span>
                        <button class="meta-btn" onclick="startEdit('parent')">変更</button>
                    </div>
                    <div class="meta-item">
                        <span>📝 ${item.isMemo ? '<span class="tag-memo">メモ</span>' : '質問'}</span>
                        <button class="meta-btn" onclick="startEdit('memo')">切替</button>
                    </div>
                    <div class="meta-item" style="margin-left:auto;">
                        <button class="meta-btn" style="color:#ef4444;" onclick="deleteQuestion(${item.id})">削除</button>
                    </div>
                </div>

                ${isEditingParent ? `
                    <div class="detail-card" style="margin-bottom: 2rem;">
                        <div style="font-size:0.75rem; font-weight:700; margin-bottom:8px;">親質問を選択</div>
                        <select id="parentSelect" style="width:100%; padding:4px; margin-bottom:8px;">
                            <option value="null" ${item.parentId === null ? 'selected' : ''}>-- 親なし --</option>
                            ${data.filter(q => q.id !== item.id).map(q => `<option value="${q.id}" ${item.parentId === q.id ? 'selected' : ''}>${q.title}</option>`).join('')}
                        </select>
                        <button onclick="saveEdit('parent')">適用</button>
                        <button onclick="cancelEdit()">戻る</button>
                    </div>
                ` : ''}

                ${isEditingMemo ? `
                    <div class="detail-card" style="margin-bottom: 2rem;">
                        <label style="font-size:0.8rem; display:flex; align-items:center; gap:8px;">
                            <input type="checkbox" id="memoCheckbox" ${item.isMemo ? 'checked' : ''}>
                            メモとして扱う (面接から除外)
                        </label>
                        <div style="margin-top:8px;">
                            <button onclick="saveEdit('memo')">適用</button>
                            <button onclick="cancelEdit()">戻る</button>
                        </div>
                    </div>
                ` : ''}

                <div class="view-title-container">
                    ${editingSection === 'title' ? `
                        <input id="editInput" value="${item.title}" style="flex:1; padding:8px; font-size:1.25rem;">
                        <button onclick="saveEdit('title')">保存</button>
                    ` : `
                        <h2 class="view-title">${item.title}</h2>
                        <button class="meta-btn" onclick="startEdit('title')">名称編集</button>
                    `}
                </div>

                <div style="margin-bottom:2rem; padding:1.5rem; background:#fffbeb; border-radius:12px; border-left:6px solid var(--accent);">
                    <div style="font-size:0.75rem; font-weight:700; color:#92400e; margin-bottom:0.5rem; text-transform:uppercase;">基本回答</div>
                    ${isEditingMain ? `
                        <textarea id="editArea" style="width:100%; height:120px; padding:10px; border:1px solid #fde68a;">${item.answer}</textarea>
                        <button onclick="saveEdit('answer')">保存</button>
                    ` : `
                        <div class="answer-text ${blurClass}">${item.answer || '(未入力)'}</div>
                        <button class="meta-btn" style="margin-top:0.5rem;" onclick="startEdit('answer')">内容を編集</button>
                    `}
                </div>

                ${detailsHTML ? `<div><span style="font-size:0.8rem; font-weight:700; color:#64748b;">◆ 深掘り補足:</span>${detailsHTML}</div>` : ''}
                <button onclick="addDetail()" style="margin-top:1rem; font-size:0.75rem; color:#64748b; background:none; border:1px dashed #cbd5e1; padding:4px 12px; border-radius:4px; cursor:pointer;">+ 深掘り項目を追加</button>
            `;
        }

        // Logic Helpers
        function startEdit(section) { editingSection = section; renderContent(); }
        function cancelEdit() { editingSection = null; renderContent(); }
        function saveEdit(section) {
            const data = getCurrentData();
            const item = data.find(i => i.id === selectedId);
            if (section === 'answer') item.answer = document.getElementById('editArea').value;
            else if (section === 'title') item.title = document.getElementById('editInput').value;
            else if (section === 'memo') item.isMemo = document.getElementById('memoCheckbox').checked;
            else if (section === 'parent') {
                const val = document.getElementById('parentSelect').value;
                item.parentId = val === 'null' ? null : parseInt(val);
            }
            else if (section.startsWith('detail-')) {
                const key = section.replace('detail-', '');
                item.details[key] = document.getElementById('editArea').value;
            }
            editingSection = null;
            saveData();
            renderContent();
            listItems();
        }

        function addQuestion() {
            const data = getCurrentData();
            const maxId = data.length > 0 ? Math.max(...data.map(d => d.id)) : -1;
            const newId = maxId + 1;
            data.push({ id: newId, title: "新規質問", answer: "", details: {}, parentId: null, isMemo: false });
            saveData();
            selectItem(newId);
            startEdit('title');
        }

        function deleteQuestion(id) {
            if (!confirm('削除しますか？')) return;
            const data = getCurrentData();
            allProjects[currentProjectIndex].data = data.filter(d => d.id !== id);
            saveData();
            selectedId = null;
            document.getElementById('welcomeMsg').style.display = 'block';
            document.getElementById('qaCard').style.display = 'none';
            listItems();
        }

        function addDetail() {
            const key = prompt('深掘りの項目名（例：具体的な数値、当時の心境など）:');
            if (!key) return;
            const data = getCurrentData();
            const item = data.find(i => i.id === selectedId);
            item.details[key] = "";
            saveData();
            startEdit(`detail-${key}`);
        }

        function toggleStudyMode() {
            studyMode = !studyMode;
            const btn = document.getElementById('studyModeBtn');
            btn.innerText = studyMode ? '暗記モード: ON' : '暗記モード: OFF';
            btn.classList.toggle('active', studyMode);
            renderContent();
        }

        function exportCurrentProject() {
            const project = allProjects[currentProjectIndex];
            const content = `const IMPORTED_PROJECT = ${JSON.stringify(project, null, 2)};`;
            const blob = new Blob([content], { type: 'text/javascript' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `backup_${project.name}_${new Date().toISOString().slice(0,10)}.js`;
            a.click();
        }

        function handleImport(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                const content = e.target.result;
                try {
                    // Extract JSON from "const ... = { ... };"
                    const jsonMatch = content.match(/=\s*(\{[\s\S]*\});?\s*$/);
                    if (!jsonMatch) throw new Error('形式が正しくありません。自己回答を書き出したJSファイルを選択してください。');
                    
                    const imported = JSON.parse(jsonMatch[1]);
                    
                    // Allow both legacy QA_DATA style and new project style
                    let newProject;
                    if (Array.isArray(imported)) {
                        // Old style (just QA array)
                        const name = prompt('プロジェクト名を入力してください', file.name.replace('.js', ''));
                        if (!name) return;
                        newProject = { id: 'imported-' + Date.now(), name: name, description: 'バックアップから復元', data: imported };
                    } else if (imported.data) {
                        // Project style
                        newProject = imported;
                        newProject.id = 'imported-' + Date.now(); // Renew ID to avoid collision
                    } else {
                        throw new Error('データ項目が見つかりませんでした。');
                    }

                    allProjects.push(newProject);
                    saveData();
                    renderDashboard();
                    alert('プロジェクトを復元しました：' + newProject.name);
                } catch (err) {
                    alert('エラー: ' + err.message);
                }
            };
            reader.readAsText(file);
            event.target.value = ''; // Reset input
        }

        // --- Mock Interview Mode ---
        let mockTimer = 0;
        let mockInterval = null;
        let mockCurrentId = null;

        function startMockMode() {
            const data = getCurrentData().filter(q => !q.isMemo);
            if (data.length === 0) { alert('質問が登録されていません。（メモ以外の項目が必要です）'); return; }
            document.getElementById('mockOverlay').style.display = 'flex';
            mockCurrentId = null;
            nextMockQuestion();
            resetMockTimer();
        }

        function exitMockMode() {
            document.getElementById('mockOverlay').style.display = 'none';
            stopMockTimer();
        }

        function nextMockQuestion() {
            let nextId = null;
            const validQuestions = getCurrentData().filter(q => !q.isMemo);
            
            if (mockCurrentId === null) {
                const roots = validQuestions.filter(q => q.parentId === null);
                const candidates = roots.length > 0 ? roots : validQuestions;
                nextId = candidates[Math.floor(Math.random() * candidates.length)].id;
            } else {
                const children = validQuestions.filter(q => q.parentId === mockCurrentId);
                if (children.length > 0 && Math.random() < 0.7) {
                    nextId = children[Math.floor(Math.random() * children.length)].id;
                } else {
                    const roots = validQuestions.filter(q => q.parentId === null && q.id !== mockCurrentId);
                    const candidates = roots.length > 0 ? roots : validQuestions;
                    nextId = candidates[Math.floor(Math.random() * candidates.length)].id;
                }
            }
            
            mockCurrentId = nextId;
            const question = validQuestions.find(q => q.id === nextId);
            const parent = question.parentId !== null ? validQuestions.find(p => p.id === question.parentId) : null;
            
            document.getElementById('mockContextText').innerText = parent ? `深掘り: ${parent.title}` : `新しいトピック`;
            document.getElementById('mockQuestionText').innerText = question.title;
            
            let answerHTML = `<div><strong>${question.answer || ''}</strong></div>`;
            if (Object.keys(question.details).length > 0) {
                answerHTML += '<div style="margin-top:1rem; border-top:1px solid rgba(255,255,255,0.1); padding-top:1rem;">';
                for (const [key, val] of Object.entries(question.details)) {
                    answerHTML += `<div style="margin-bottom:0.5rem;"><small style="color:var(--accent);">${key}:</small> ${val}</div>`;
                }
                answerHTML += '</div>';
            }
            
            document.getElementById('mockAnswerContent').innerHTML = answerHTML;
            document.getElementById('mockAnswerArea').style.display = 'none';
            document.getElementById('mockAnswerBtn').innerText = '回答を表示';
            
            resetMockTimer();
        }

        function toggleMockAnswer() {
            const area = document.getElementById('mockAnswerArea');
            const btn = document.getElementById('mockAnswerBtn');
            const isHidden = area.style.display === 'none';
            area.style.display = isHidden ? 'block' : 'none';
            btn.innerText = isHidden ? '回答を隠す' : '回答を表示';
        }

        function resetMockTimer() {
            stopMockTimer();
            mockTimer = 0;
            updateMockTimerDisplay();
            mockInterval = setInterval(() => {
                mockTimer++;
                updateMockTimerDisplay();
            }, 1000);
        }

        function stopMockTimer() {
            if (mockInterval) clearInterval(mockInterval);
        }

        function updateMockTimerDisplay() {
            const mins = Math.floor(mockTimer / 60).toString().padStart(2, '0');
            const secs = (mockTimer % 60).toString().padStart(2, '0');
            document.getElementById('mockTimerDisplay').innerText = `${mins}:${secs}`;
        }

        function restoreGuide() {
            if (allProjects.some(p => p.id === 'guide-project')) {
                alert('使い方ガイドは既にリストにあります。');
                return;
            }
            const guide = DEFAULT_PROJECTS.find(p => p.id === 'guide-project');
            if (guide) {
                allProjects.push(JSON.parse(JSON.stringify(guide)));
                saveData();
                renderDashboard();
                alert('使い方ガイドを追加しました。');
            }
        }

        // Run Init
        initApp();
    </script>
</body>
</html>
