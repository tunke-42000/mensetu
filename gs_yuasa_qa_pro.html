<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GS Yuasa - Interactive Q&A Portal Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #003399;
            --secondary: #1e293b;
            --accent: #feba02;
            --bg: #f1f5f9;
            --sidebar: #ffffff;
            --border: #e2e8f0;
            --card-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            background-color: var(--bg);
            color: var(--secondary);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar Navigation */
        aside {
            width: 380px;
            background: var(--sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            z-index: 50;
        }

        .sidebar-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border);
        }

        .logo {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .search-container {
            position: relative;
        }

        #searchBox {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.9rem;
            outline: none;
            transition: var(--transition);
        }

        #searchBox:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 51, 153, 0.1);
        }

        .add-btn {
            width: 100%;
            padding: 0.6rem;
            margin-top: 1rem;
            background: #f8fafc;
            border: 1px dashed var(--border);
            border-radius: 8px;
            color: #64748b;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .add-btn:hover {
            background: #f1f5f9;
            border-color: var(--primary);
            color: var(--primary);
        }

        .nav-list {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
        }

        .nav-item {
            padding: 0.85rem 1rem;
            border-radius: 8px;
            margin-bottom: 0.5rem;
            cursor: pointer;
            transition: var(--transition);
            border: 1px solid transparent;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .nav-item:hover { background: #f8fafc; }
        .nav-item.active {
            background: #e0f2fe;
            color: var(--primary);
            border-color: #bae6fd;
            font-weight: 700;
        }
        .nav-item.memo {
            background: #fef9c3; /* Light yellow for memos */
            border-left: 4px solid #facc15;
        }
        .nav-item.memo.active {
            background: #fef08a;
            border-color: #facc15;
        }
        .nav-item.child {
            margin-left: 1.5rem;
            font-size: 0.85rem;
            border-left: 2px solid var(--border);
            border-radius: 0 8px 8px 0;
            padding-left: 1rem;
        }
        .nav-item.child::before {
            content: "└ ";
            color: #94a3b8;
            margin-right: 4px;
        }

        /* Main Content */
        main {
            flex: 1;
            overflow-y: auto;
            padding: 3rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .content-container {
            max-width: 800px;
            width: 100%;
        }

        .top-controls {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-bottom: 2rem;
        }

        .control-btn {
            padding: 0.5rem 1.2rem;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: white;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        .control-btn:hover { background: #f8fafc; }
        .control-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .export-btn {
            background: #059669;
            color: white;
            border-color: #059669;
        }
        .export-btn:hover { background: #047857; }

        .delete-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 4px 12px;
            font-size: 0.75rem;
            border-radius: 4px;
            cursor: pointer;
            transition: var(--transition);
        }
        .delete-btn:hover { background: #dc2626; }

        .mock-btn {
            background: #7c3aed;
            color: white;
            border-color: #7c3aed;
        }
        .mock-btn:hover { background: #6d28d9; }

        /* Mock Interview Overlay */
        #mockOverlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('面接官画像.png');
            background-size: cover;
            background-position: center;
            z-index: 1000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            color: white;
            padding: 2rem;
            backdrop-filter: none;
        }

        .mock-content {
            max-width: 1000px;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: flex-end; /* Push to right */
            justify-content: flex-start;
            padding-top: 5vh;
        }

        .mock-context {
            color: var(--accent);
            text-transform: uppercase;
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 1rem;
            letter-spacing: 0.1em;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            background: rgba(0,0,0,0.5);
            padding: 4px 12px;
            border-radius: 4px;
        }

        .mock-question {
            font-size: 1.8rem;
            font-weight: 700;
            line-height: 1.5;
            color: var(--secondary);
            background: white;
            padding: 2rem 2.5rem;
            border-radius: 30px;
            position: relative;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            max-width: 60%; /* Narrower for side-display */
            margin-right: 2rem;
            display: inline-block;
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: left;
        }

        /* Speech Bubble Tail - Pointing Bottom Left */
        .mock-question::after {
            content: "";
            position: absolute;
            bottom: -15px;
            left: 30px; /* Offset to the left */
            border-width: 25px 0 0 25px; /* Angle towards center */
            border-style: solid;
            border-color: white transparent transparent transparent;
        }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.8) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        .mock-answer-area {
            background: rgba(255, 255, 255, 0.95);
            color: var(--secondary);
            border-radius: 16px;
            padding: 2rem;
            margin-top: 1rem;
            text-align: left;
            display: none;
            max-height: 40vh;
            overflow-y: auto;
            border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            width: 80%;
            align-self: center; /* Center the answer box */
        }

        .mock-controls {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            margin-top: auto; /* Push to bottom */
            padding-bottom: 3rem;
            align-self: center; /* Center horizontally */
        }

        .mock-btn-large {
            padding: 1rem 2rem;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }

        .mock-btn-main { background: var(--accent); color: #000; }
        .mock-btn-main:hover { transform: scale(1.05); background: #eab308; }
        
        .mock-btn-sub { background: rgba(255, 255, 255, 0.1); color: white; border: 1px solid rgba(255, 255, 255, 0.2); }
        .mock-btn-sub:hover { background: rgba(255, 255, 255, 0.2); }

        .mock-timer {
            font-family: monospace;
            font-size: 1.5rem;
            margin-bottom: 2rem;
            color: #94a3b8;
        }

        .mock-exit {
            position: absolute;
            top: 2rem;
            right: 2rem;
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 2rem;
            cursor: pointer;
        }
        .mock-exit:hover { color: white; }

        /* Edit Controls */
        .edit-controls {
            display: flex;
            gap: 8px;
            margin-top: 1rem;
        }

        .edit-textarea {
            width: 100%;
            min-height: 150px;
            padding: 1rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-family: inherit;
            font-size: 1rem;
            line-height: 1.6;
            resize: vertical;
            outline: none;
            transition: var(--transition);
        }

        .edit-input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-family: inherit;
            font-size: 1.25rem;
            font-weight: 700;
            outline: none;
        }

        .edit-select {
            width: 100%;
            padding: 0.75rem;
            margin-bottom: 1rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            outline: none;
        }

        .edit-textarea:focus, .edit-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 51, 153, 0.1);
        }

        .btn-small {
            padding: 4px 12px;
            font-size: 0.75rem;
            border-radius: 4px;
            cursor: pointer;
            border: 1px solid var(--border);
            background: white;
            transition: var(--transition);
        }
        .btn-small:hover { background: #f1f5f9; }
        .btn-save { background: var(--primary); color: white; border-color: var(--primary); }
        .btn-save:hover { background: #002266; }

        .answer-label-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }

        /* Question View Card */
        #qaCard {
            background: white;
            border-radius: 16px;
            padding: 2.5rem;
            box-shadow: var(--card-shadow);
            min-height: 400px;
            display: none;
        }

        .parent-breadcrumb {
            font-size: 0.75rem;
            color: #64748b;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .view-title-container {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid #f1f5f9;
        }

        .view-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            margin: 0;
            flex: 1;
        }

        .answer-block {
            margin-bottom: 2.5rem;
            animation: fadeIn 0.3s ease-out;
        }

        .answer-label {
            font-size: 0.85rem;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .answer-text {
            font-size: 1.05rem;
            line-height: 1.8;
            white-space: pre-wrap;
        }

        .detail-card {
            background: #f8fafc;
            border-radius: 10px;
            padding: 1.25rem;
            margin-top: 1rem;
            border: 1px dashed var(--border);
            position: relative;
        }

        .detail-key {
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 0.25rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .blurred {
            filter: blur(8px);
            opacity: 0.3;
            user-select: none;
            transition: filter 0.3s ease;
        }

        .blurred:hover { filter: blur(0); opacity: 1; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 900px) {
            body { flex-direction: column; }
            aside { width: 100%; height: auto; border-right: none; border-bottom: 1px solid var(--border); }
            main { padding: 1.5rem; }
        }
    </style>
</head>
<body>
    <aside>
        <div class="sidebar-header">
            <div class="logo">
                <span style="display:inline-block; width:12px; height:12px; background:var(--accent); border-radius:50%;"></span>
                GS YUASA Q&A Pro
            </div>
            <div class="search-container">
                <input type="text" id="searchBox" placeholder="質問を検索..." onkeyup="listItems()">
                <button class="add-btn" onclick="addQuestion()">
                    <span>+</span> 質問を追加
                </button>
            </div>
        </div>
        <div class="nav-list" id="sidebarList">
            <!-- Nav items injected here -->
        </div>
    </aside>

    <main>
        <div class="content-container">
            <div class="top-controls">
                <button id="studyModeBtn" class="control-btn" onclick="toggleStudyMode()">暗記モード: OFF</button>
                <button class="control-btn mock-btn" onclick="startMockMode()">模擬面接を開始</button>
                <button class="control-btn export-btn" onclick="exportData()">JSファイルを書き出し</button>
                <button class="control-btn" onclick="window.print()">PDF出力</button>
            </div>

            <div id="welcomeMsg" style="text-align: center; margin-top: 5rem; color: #94a3b8;">
                <h2 style="font-size: 2rem; margin-bottom: 1rem;">準備は整いました</h2>
                <p>左側のメニューから質問を選択して、回答を確認してください。</p>
            </div>

            <div id="qaCard">
                <div id="cardContent">
                    <!-- Dynamic content injected here -->
                </div>
            </div>
        </div>
    </main>

    <!-- LOAD DATA -->
    <script src="qa_data.js"></script>

    <script>
        let selectedId = null;
        let studyMode = false;
        let editingSection = null; // 'title', 'memo', 'answer', 'parent', or 'detail-KEY'
        let currentData = [];

        // Load data from localStorage or fallback to default QA_DATA
        function initData() {
            const saved = localStorage.getItem('GS_YUASA_QA_DATA');
            if (saved) {
                currentData = JSON.parse(saved);
            } else {
                currentData = JSON.parse(JSON.stringify(QA_DATA)); // Deep copy
            }
            // Ensure isMemo exists (for older data)
            currentData.forEach(d => { if (d.isMemo === undefined) d.isMemo = false; });
        }

        function saveDataToLocal() {
            localStorage.setItem('GS_YUASA_QA_DATA', JSON.stringify(currentData));
        }

        function addQuestion() {
            const maxId = currentData.length > 0 ? Math.max(...currentData.map(d => d.id)) : -1;
            const newId = maxId + 1;
            const newItem = {
                id: newId,
                title: "（新しい項目）",
                answer: "",
                details: {},
                parentId: null,
                isMemo: false
            };
            currentData.push(newItem);
            saveDataToLocal();
            selectItem(newId);
            startEdit('title');
        }

        function deleteQuestion(id) {
            if (!confirm('この項目を削除してもよろしいですか？')) return;
            currentData = currentData.filter(d => d.id !== id);
            // 子質問のparentIdをリセット
            currentData.forEach(d => { if (d.parentId === id) d.parentId = null; });
            saveDataToLocal();
            selectedId = null;
            document.getElementById('welcomeMsg').style.display = 'block';
            document.getElementById('qaCard').style.display = 'none';
            listItems();
        }

        function listItems() {
            const list = document.getElementById('sidebarList');
            const search = document.getElementById('searchBox').value.toLowerCase();
            list.innerHTML = '';

            const filtered = currentData.filter(item => {
                return item.title.toLowerCase().includes(search) || 
                       item.answer.toLowerCase().includes(search);
            });

            // To support hierarchy, we render roots first, then their children
            const roots = filtered.filter(item => item.parentId === null);
            const others = filtered.filter(item => item.parentId !== null);

            roots.forEach(root => {
                renderNavItem(list, root, false);
                const children = others.filter(child => child.parentId === root.id);
                children.forEach(child => renderNavItem(list, child, true));
            });
        }

        function renderNavItem(container, item, isChild) {
            const div = document.createElement('div');
            div.className = `nav-item ${selectedId === item.id ? 'active' : ''} ${isChild ? 'child' : ''} ${item.isMemo ? 'memo' : ''}`;
            div.onclick = () => selectItem(item.id);
            div.innerHTML = `
                <div>${item.isMemo ? '📝 ' : ''}${item.title}</div>
            `;
            container.appendChild(div);
        }

        function selectItem(id) {
            selectedId = id;
            editingSection = null;
            listItems();
            renderContent();
        }

        function renderContent() {
            const item = currentData.find(i => i.id === selectedId);
            if (!item) return;

            document.getElementById('welcomeMsg').style.display = 'none';
            const card = document.getElementById('qaCard');
            card.style.display = 'block';

            const parentItem = item.parentId !== null ? currentData.find(p => p.id === item.parentId) : null;
            const isEditingParent = editingSection === 'parent';
            const isEditingTitle = editingSection === 'title';
            const isEditingMemo = editingSection === 'memo';

            let detailsHTML = '';
            for (const [key, val] of Object.entries(item.details)) {
                const isEditingThisDetail = editingSection === `detail-${key}`;
                detailsHTML += `
                    <div class="detail-card">
                        <div class="detail-key">
                            <span>${key}</span>
                            ${!isEditingThisDetail ? `<button class="btn-small" onclick="startEdit('detail-${key}')">編集</button>` : ''}
                        </div>
                        ${isEditingThisDetail ? `
                            <textarea id="editArea" class="edit-textarea">${val}</textarea>
                            <div class="edit-controls">
                                <button class="btn-small btn-save" onclick="saveEdit('detail-${key}')">保存</button>
                                <button class="btn-small" onclick="cancelEdit()">キャンセル</button>
                            </div>
                        ` : `<div class="answer-text ${studyMode ? 'blurred' : ''}">${val}</div>`}
                    </div>
                `;
            }

            const isEditingMain = editingSection === 'answer';
            const blurClass = studyMode ? 'blurred' : '';

            document.getElementById('cardContent').innerHTML = `
                <div class="parent-breadcrumb" style="border-bottom:1px solid #f1f5f9; padding-bottom:8px; margin-bottom:1rem; display:flex; gap:12px; font-size:0.7rem;">
                    <div style="display:flex; align-items:center; gap:4px;">
                        <span>🏷️ ${parentItem ? `親: ${parentItem.title}` : 'ルート質問'}</span>
                        <button class="btn-small" style="font-size:0.65rem;" onclick="startEdit('parent')">変更</button>
                    </div>
                    <div style="display:flex; align-items:center; gap:4px;">
                        <span>📝 ${item.isMemo ? '<span style="background:#fef08a; padding:1px 4px; border-radius:3px;">メモ</span>' : '質問'}</span>
                        <button class="btn-small" style="font-size:0.65rem;" onclick="startEdit('memo')">切替え</button>
                    </div>
                    <div style="margin-left:auto;">
                        <button class="delete-btn" style="padding:1px 6px; font-size:0.65rem;" onclick="deleteQuestion(${item.id})">削除</button>
                    </div>
                </div>

                ${isEditingParent ? `
                    <div class="detail-card" style="margin-bottom: 2rem;">
                        <div class="detail-key">親質問を選択</div>
                        <select id="parentSelect" class="edit-select">
                            <option value="null" ${item.parentId === null ? 'selected' : ''}>-- 親なし --</option>
                            ${currentData.filter(q => q.id !== item.id).map(q => `<option value="${q.id}" ${item.parentId === q.id ? 'selected' : ''}>${q.title}</option>`).join('')}
                        </select>
                        <div class="edit-controls">
                            <button class="btn-small btn-save" onclick="saveEdit('parent')">適用</button>
                            <button class="btn-small" onclick="cancelEdit()">キャンセル</button>
                        </div>
                    </div>
                ` : ''}

                ${isEditingMemo ? `
                    <div class="detail-card" style="margin-bottom: 2rem;">
                        <label style="display:flex; align-items:center; gap:10px; font-size:0.8rem;">
                            <input type="checkbox" id="memoCheckbox" ${item.isMemo ? 'checked' : ''}>
                            メモとして扱う (模擬面接から除外)
                        </label>
                        <div class="edit-controls">
                            <button class="btn-small btn-save" onclick="saveEdit('memo')">保存</button>
                            <button class="btn-small" onclick="cancelEdit()">キャンセル</button>
                        </div>
                    </div>
                ` : ''}

                <div class="view-title-container">
                    ${isEditingTitle ? `
                        <div style="flex:1;">
                            <input id="editInput" class="edit-input" value="${item.title}">
                            <div class="edit-controls">
                                <button class="btn-small btn-save" onclick="saveEdit('title')">保存</button>
                                <button class="btn-small" onclick="cancelEdit()">戻る</button>
                            </div>
                        </div>
                    ` : `
                        <h2 class="view-title">${item.title}</h2>
                        <button class="btn-small" onclick="startEdit('title')">名称編集</button>
                    `}
                </div>
                
                <div class="answer-block" style="background:#f0f7ff; padding:1.5rem; border-radius:12px; border-left:6px solid var(--primary);">
                    <div class="answer-label-container">
                        <div class="answer-label" style="color:var(--primary);">◆ 基本回答</div>
                        ${!isEditingMain ? `<button class="btn-small" onclick="startEdit('answer')">編集</button>` : ''}
                    </div>
                    ${isEditingMain ? `
                        <textarea id="editArea" class="edit-textarea">${item.answer}</textarea>
                        <div class="edit-controls">
                            <button class="btn-small btn-save" onclick="saveEdit('answer')">保存</button>
                            <button class="btn-small" onclick="cancelEdit()">戻る</button>
                        </div>
                    ` : `<div class="answer-text ${blurClass}">${item.answer || '(未入力)'}</div>`}
                </div>

                ${(detailsHTML || (item.details && Object.keys(item.details).length > 0)) ? `
                <div class="answer-block">
                    <div class="answer-label">◆ 深掘り / 補足</div>
                    <div>${detailsHTML}</div>
                    <button class="btn-small" style="margin-top:1rem; border-style:dashed;" onclick="addDetail()">+ 項目追加</button>
                </div>
                ` : `<button class="btn-small" style="border-style:dashed;" onclick="addDetail()">+ 深掘り項目を追加</button>`}
            `;
        }

        function startEdit(section) {
            editingSection = section;
            renderContent();
            const el = document.getElementById('editArea') || document.getElementById('editInput') || document.getElementById('memoCheckbox');
            if (el) el.focus();
        }

        function cancelEdit() {
            editingSection = null;
            renderContent();
        }

        function saveEdit(section) {
            const item = currentData.find(i => i.id === selectedId);
            
            if (section === 'answer') {
                item.answer = document.getElementById('editArea').value;
            } else if (section === 'title') {
                item.title = document.getElementById('editInput').value;
            } else if (section === 'memo') {
                item.isMemo = document.getElementById('memoCheckbox').checked;
            } else if (section === 'parent') {
                const val = document.getElementById('parentSelect').value;
                item.parentId = val === 'null' ? null : parseInt(val);
            } else if (section.startsWith('detail-')) {
                const key = section.replace('detail-', '');
                item.details[key] = document.getElementById('editArea').value;
            }
            
            editingSection = null;
            saveDataToLocal();
            renderContent();
            listItems();
        }

        function toggleStudyMode() {
            studyMode = !studyMode;
            const btn = document.getElementById('studyModeBtn');
            btn.innerText = studyMode ? '暗記モード: ON' : '暗記モード: OFF';
            btn.classList.toggle('active', studyMode);
            renderContent();
        }

        function exportData() {
            const content = `const QA_DATA = ${JSON.stringify(currentData, null, 2)};`;
            const blob = new Blob([content], { type: 'text/javascript' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'qa_data.js';
            a.click();
            URL.revokeObjectURL(url);
            alert('qa_data.js を作成しました。\n現在使用しているファイルと置き換えて保存してください。');
        }

        // Initialize
        initData();
        listItems();

        // --- Mock Interview Mode Logic ---
        let mockTimer = 0;
        let mockInterval = null;
        let mockCurrentId = null;

        function startMockMode() {
            const validQuestions = currentData.filter(q => !q.isMemo);
            if (validQuestions.length === 0) {
                alert('質問が登録されていません。（メモ以外の項目が必要です）');
                return;
            }
            document.getElementById('mockOverlay').style.display = 'flex';
            mockCurrentId = null;
            nextMockQuestion();
            resetMockTimer();
        }

        function exitMockMode() {
            document.getElementById('mockOverlay').style.display = 'none';
            stopMockTimer();
        }

        function nextMockQuestion() {
            let nextId = null;
            const validQuestions = currentData.filter(q => !q.isMemo);
            
            if (mockCurrentId === null) {
                // 初回はルート質問をランダムに選ぶ
                const roots = validQuestions.filter(q => q.parentId === null);
                const candidates = roots.length > 0 ? roots : validQuestions;
                nextId = candidates[Math.floor(Math.random() * candidates.length)].id;
            } else {
                // 現在の質問に深掘り（子）があるか確認
                const children = validQuestions.filter(q => q.parentId === mockCurrentId);
                
                if (children.length > 0 && Math.random() < 0.7) {
                    // 70%の確率で深掘りに進む
                    nextId = children[Math.floor(Math.random() * children.length)].id;
                } else {
                    // 深掘りがないか、30%の確率で新しい大問へ
                    const roots = validQuestions.filter(q => q.parentId === null && q.id !== mockCurrentId);
                    const candidates = roots.length > 0 ? roots : validQuestions;
                    nextId = candidates[Math.floor(Math.random() * candidates.length)].id;
                }
            }
            
            mockCurrentId = nextId;
            const question = currentData.find(q => q.id === nextId);
            const parent = question.parentId !== null ? currentData.find(p => p.id === question.parentId) : null;
            
            document.getElementById('mockContextText').innerText = parent ? `深掘り: ${parent.title}` : `新しいトピックへの切り替え`;
            document.getElementById('mockQuestionText').innerText = question.title;
            
            let answerHTML = `<div><strong>${question.answer || ''}</strong></div>`;
            if (Object.keys(question.details).length > 0) {
                answerHTML += '<div style="margin-top:1rem; border-top:1px solid rgba(255,255,255,0.1); padding-top:1rem;">';
                for (const [key, val] of Object.entries(question.details)) {
                    answerHTML += `<div style="margin-bottom:0.5rem;"><small style="color:var(--accent);">${key}:</small> ${val}</div>`;
                }
                answerHTML += '</div>';
            }
            
            document.getElementById('mockAnswerContent').innerHTML = answerHTML;
            document.getElementById('mockAnswerArea').style.display = 'none';
            document.getElementById('mockAnswerBtn').innerText = '回答を表示';
            
            resetMockTimer();
        }

        function toggleMockAnswer() {
            const area = document.getElementById('mockAnswerArea');
            const btn = document.getElementById('mockAnswerBtn');
            if (area.style.display === 'none') {
                area.style.display = 'block';
                btn.innerText = '回答を隠す';
            } else {
                area.style.display = 'none';
                btn.innerText = '回答を表示';
            }
        }

        function resetMockTimer() {
            stopMockTimer();
            mockTimer = 0;
            updateMockTimerDisplay();
            mockInterval = setInterval(() => {
                mockTimer++;
                updateMockTimerDisplay();
            }, 1000);
        }

        function stopMockTimer() {
            if (mockInterval) clearInterval(mockInterval);
        }

        function updateMockTimerDisplay() {
            const mins = Math.floor(mockTimer / 60).toString().padStart(2, '0');
            const secs = (mockTimer % 60).toString().padStart(2, '0');
            document.getElementById('mockTimerDisplay').innerText = `${mins}:${secs}`;
        }
    </script>

    <!-- Mock Interview Overlay HTML -->
    <div id="mockOverlay">
        <button class="mock-exit" onclick="exitMockMode()">&times;</button>
        <div class="mock-content">
            <div class="mock-timer" id="mockTimerDisplay">00:00</div>
            <div class="mock-context" id="mockContextText">TOPIC</div>
            <div class="mock-question" id="mockQuestionText">質問内容がここに入ります</div>
            
            <div class="mock-answer-area" id="mockAnswerArea">
                <div id="mockAnswerContent"></div>
            </div>

            <div class="mock-controls">
                <button class="mock-btn-large mock-btn-sub" id="mockAnswerBtn" onclick="toggleMockAnswer()">回答を表示</button>
                <button class="mock-btn-large mock-btn-main" onclick="nextMockQuestion()">次の質問へ</button>
            </div>
        </div>
    </div>
</body>
</html>
